name: Deploy CRM (GitHub Pages)

# Publica o protótipo do Nexus CRM (web/) no GitHub Pages.
# Pré-requisito: no GitHub, vá em Settings > Pages e defina "Source: GitHub Actions".
on:
  push:
    branches:
      - main
      - 'cursor/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Base path = "/<nome-do-repositorio>/"
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback (404 -> index.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
